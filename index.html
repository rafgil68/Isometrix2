
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<link rel="manifest" href="manifest.json">
    <title>Isometrix2 - Entrenamiento</title>
    <style>
		html {
			font-size: 18px; /* Esto hará que todos los 'rem' sean más grandes */
		}
        body { font-family: sans-serif;
            background-color: #121212;
            color: white;
            padding: 10px; /* Reducimos el padding de los lados */
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column; }
        .selector-dia { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .btn-dia { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; color: white; font-weight: bold; }
        #btn-dia1 { background-color: #3498db; }
        #btn-dia2 { background-color: #e67e22; }
        #btn-dia3 { background-color: #27ae60; }
        
        .ejercicio-card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            margin: 10px auto;
            width: 100%;       /* Cambiado de max-width a width: 100% */
            max-width: 600px;  /* Un poco más ancho para pantallas grandes */
        }
        .info-peso { color: #3498db; font-weight: bold; font-size: 1.2rem; }
        .cronometro {
            font-size: 3.5rem; /* Ajusta este tamaño si sigue viéndose raro */
            font-weight: 900;
            margin: 15px 0;
        }
        
		.btn-principal { 
			display: block;          /* Convierte el botón en bloque para ocupar espacio */
			width: 80%;              /* Ajusta el ancho al 80% del contenedor */
			max-width: 300px;        /* Evita que sea demasiado ancho en pantallas grandes */
			margin: 20px auto;       /* El 'auto' es lo que centra el bloque horizontalmente */
			padding: 15px; 
			border-radius: 50px; 
			border: none; 
			background-color: #2ecc71; 
			color: white; 
			font-weight: bold; 
			cursor: pointer; 
		}
		
		/* Contenedor fijo para todas las imágenes */
        .contenedor-img-ej { 
            width: 100%; 
            height: 250px; /* Define aquí la altura fija que prefieras */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 15px 0; 
            overflow: hidden; 
            background: #1a1a1a; /* Opcional: fondo si la imagen no llena todo */
            border-radius: 15px;
        }
		#ui-imagen-ejercicio { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* 'contain' mantiene la proporción, 'cover' la recorta para llenar */
            display: none; 
        }
		
		/* Estilos de Configuración (Panel) */
        #pantalla-ajustes {
			display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
			background-color: #121212; z-index: 200; padding: 20px; overflow-y: auto; text-align: left;
		}
		/* Botón de Ajustes (Arriba a la derecha) */
        .btn-config {
			position: fixed; /* Cambiado a fixed para que siempre esté presente */
			top: 15px; 
			right: 15px; 
			z-index: 9999; /* Asegura que esté por encima de todo */
			background: rgba(0,0,0,0.5); /* Un fondo ligero para que sea visible */
			border: none;
			cursor: pointer;
			font-size: 1.6rem;
		}

        .fila-ajuste { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
        .input-tiempo {
			width: 50px; /* Reducido para ajustarse a 3 cifras */
			padding: 6px 4px;
			background-color: #333;
			border: 1px solid #555;
			color: white;
			border-radius: 5px;
			text-align: center;
			font-size: 1rem;
			font-weight: bold;
		}
		
		/* Contenedor de cada fila de ejercicio */
		.fila-ejercicio {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 12px;
			padding: 5px 0;
		}

		/* El nombre del ejercicio toma espacio flexible */
		.nombre-ejercicio {
			flex: 1; /* Ocupa el espacio disponible */
			text-align: left;
			margin-right: 15px; /* Espacio extra antes del input */
		}

		/* El contenedor del input y la etiqueta se agrupan */
		.control-tiempo {
			display: flex;
			align-items: center;
			gap: 10px; /* Espacio entre el input y el texto */
			min-width: 140px; /* Ajusta este valor según lo necesites */
			justify-content: flex-end; /* Alinea todo a la derecha */
		}
	</style>
</head>
<body>
   <button class="btn-config" onclick="abrirAjustes()">⚙️</button>

        <button id="btn-control" class="btn-principal" onclick="manejarAccion()" style="display: none;">EMPEZAR</button>
    </div>
    

	<div id="pantalla-ajustes">

    <script>

		// Si la versión guardada no coincide, borramos la caché de rutinas

			localStorage.removeItem('rutinas');
			localStorage.setItem('versionRutinas', VERSION_RUTINAS);
		}

		let TIEMPO_DESCANSO = parseInt(localStorage.getItem('tiempoDescanso')) || 15;
	
        let rutinas = JSON.parse(localStorage.getItem('rutinas')) || {
            dia1: [

			{ nombre: "Sentadilla Goblet", tipo: "fuerza", reps: 12, peso: "20kg", img: "goblet.png" },
			{ nombre: "Press Pecho", tipo: "fuerza", reps: 12, peso: "20kg", img: "Press.png" },
			{ nombre: "Zancadas", tipo: "fuerza", reps: 10, peso: "15kg", img: "zancada.png" },

			{ nombre: "Press Militar", tipo: "fuerza", reps: 10, peso: "20kg", img: "hombro.png" },
			{ nombre: "Sentadilla Isométrica", tipo: "iso", tiempo: 45, img: "sentadilla.jpg" },
			{ nombre: "Sentadilla Isométrica", tipo: "iso", tiempo: 45, img: "sentadilla.jpg" },
			{ nombre: "Sentadilla Isométrica", tipo: "iso", tiempo: 45, img: "sentadilla.jpg" },
			{ nombre: "Plancha lateral dcha", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Plancha lateral izda", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Plancha lateral dcha", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Plancha lateral izda", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Hollow Hold", tipo: "iso", tiempo: 45, img: "hollow.png" },
			{ nombre: "Hollow Hold", tipo: "iso", tiempo: 45, img: "hollow.png" },
			{ nombre: "Hollow Hold", tipo: "iso", tiempo: 45, img: "hollow.png" },
			{ nombre: "Farmer Carry estático", tipo: "iso", tiempo: 45, img: "farmer.png" },
			{ nombre: "Farmer Carry estático", tipo: "iso", tiempo: 45, img: "farmer.png" }
		],
            dia2:[
			{ nombre: "movilidad espalda", tipo: "iso", tiempo: 45, img: "mov_espalda.png" },
			{ nombre: "Buenos días", tipo: "iso", tiempo: 45, img: "Buenos_dias.png" },
			{ nombre: "Bird dog", tipo: "iso", tiempo: 45, img: "bird_dog.png" },

			{ nombre: "Peso Muerto", tipo: "fuerza", reps: 10, peso: "25kg", img: "peso_muerto.png" },
			{ nombre: "Remo una mano", tipo: "fuerza", reps: 12, peso: "15kg", img: "remo.png" },
			{ nombre: "Zancadas", tipo: "fuerza", reps: 10, peso: "15kg", img: "zancada.png" },
			{ nombre: "Press Militar", tipo: "fuerza", reps: 10, peso: "12kg", img: "hombro.png" },
			{ nombre: "Sentadilla Isométrica", tipo: "iso", tiempo: 45, img: "sentadilla.jpg" },
			{ nombre: "Sentadilla Isométrica", tipo: "iso", tiempo: 45, img: "sentadilla.jpg" },
			{ nombre: "Sentadilla Isométrica", tipo: "iso", tiempo: 45, img: "sentadilla.jpg" },
			{ nombre: "Plancha Lateral (Izq)", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Plancha Lateral (Izq)", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Plancha Lateral (Izq)", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Plancha Lateral (Der)", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Plancha Lateral (Der)", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Plancha Lateral (Der)", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Supermán", tipo: "iso", tiempo: 60, img: "superman.jpg" },
			{ nombre: "Farmer Carry estático", tipo: "iso", tiempo: 45, img: "farmer.png" },
			{ nombre: "Farmer Carry estático", tipo: "iso", tiempo: 45, img: "farmer.png" }
		], 
			dia3: [
			{ nombre: "movilidad general", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "sentadillas sin peso", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Flexión isométrica", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Puente Glúteo Iso", tipo: "iso", tiempo: 60, img: "puente.png" },
			{ nombre: "Plancha abdominales", tipo: "iso", tiempo: 45, img: "plancha_lat.jpg" },
			{ nombre: "Sentadilla Goblet", tipo: "fuerza", reps: 12, peso: "20kg", img: "goblet.png" },
			{ nombre: "Press Militar", tipo: "fuerza", reps: 10, peso: "20kg", img: "hombro.png" },
			{ nombre: "Remo una mano", tipo: "fuerza", reps: 12, peso: "15kg", img: "remo.png" },
			{ nombre: "Press pecho", tipo: "fuerza", reps: 10, peso: "20kg", img: "Press.png" },
			{ nombre: "Peso Muerto Rumano", tipo: "fuerza", reps: 12, peso: "25kg", img: "peso_muerto.png" },
			{ nombre: "Esfinge", tipo: "iso", tiempo: 30, img: "esfinge.jpg" },
			{ nombre: "Esfinge", tipo: "iso", tiempo: 30, img: "esfinge.jpg" },
			{ nombre: "Esfinge", tipo: "iso", tiempo: 30, img: "esfinge.jpg" },
			{ nombre: "Puente Glúteo Iso", tipo: "iso", tiempo: 60, img: "puente.png" },
			{ nombre: "Puente Glúteo Iso", tipo: "iso", tiempo: 60, img: "puente.png" },			
			{ nombre: "Puente Glúteo Iso", tipo: "iso", tiempo: 60, img: "puente.png" },
			{ nombre: "Sentadilla Isométrica", tipo: "iso", tiempo: 45, img: "sentadilla.jpg" },
			{ nombre: "Sentadilla Isométrica", tipo: "iso", tiempo: 45, img: "sentadilla.jpg" },
			{ nombre: "Sentadilla Isométrica", tipo: "iso", tiempo: 45, img: "sentadilla.jpg" },
			{ nombre: "Farmer Carry estático", tipo: "iso", tiempo: 45, img: "farmer.png" },
			{ nombre: "Farmer Carry estático", tipo: "iso", tiempo: 45, img: "farmer.png" }

		]
        };

        let diaActual = null;
        let ejercicioIdx = 0;

        function cargarDia(dia) {
			diaActual = dia;
			ejercicioIdx = 0;
			
			document.getElementById('contenedor-selector').style.display = 'none';
			document.getElementById('ui-logo').style.display = 'none';  // ← añadir esto
			document.getElementById('ui-imagen-ejercicio').style.display = 'block';
			document.getElementById('btn-control').style.display = 'block';
			
			renderizarEjercicio();
		}


		 function renderizarEjercicio() {
			const ej = rutinas[diaActual][ejercicioIdx];
					
			document.getElementById('ui-nombre').innerText = ej.nombre;
			document.getElementById('ui-imagen-ejercicio').src = ej.img;
			
			document.getElementById('ui-info').innerText = ej.tipo === 'fuerza' ? 
				`Peso: ${ej.peso} | Reps: ${ej.reps}` : `Tiempo: ${ej.tiempo}s`;
			
			// Lógica de visibilidad
			if (ej.tipo === 'iso') {
				document.getElementById('ui-timer').style.display = 'block';
				document.getElementById('ui-timer').innerText = ej.tiempo;
				document.getElementById('btn-control').style.display = ej.tipo === 'iso' ? 'block' : 'none';
				document.getElementById('btn-control').innerText = 'EMPEZAR';
			} else {
				document.getElementById('ui-timer').style.display = 'none';
				document.getElementById('btn-control').style.display = 'block'; // Aseguramos que se vea
				document.getElementById('btn-control').innerText = "EMPEZAR";
			}
		}
		
		
		function abrirAjustes() {
			const pantalla = document.getElementById('pantalla-ajustes');
			const listaInputs = document.getElementById('lista-inputs-ejercicios');
			
			pantalla.style.display = 'block'; 
			pantalla.style.position = 'fixed';
			pantalla.style.zIndex = '9999';
			
			listaInputs.innerHTML = ''; // Limpiar antes de regenerar

			const coloresDia = { dia1: '#3498db', dia2: '#e67e22', dia3: '#27ae60' };
			const nombresDia = { dia1: 'Día 1', dia2: 'Día 2', dia3: 'Día 3' };

			['dia1', 'dia2', 'dia3'].forEach(dia => {
				const cabecera = document.createElement('h3');
				cabecera.style.cssText = `color: ${coloresDia[dia]}; margin: 20px 0 10px; border-bottom: 1px solid ${coloresDia[dia]}; padding-bottom: 6px;`;
				cabecera.innerText = nombresDia[dia];
				listaInputs.appendChild(cabecera);

				rutinas[dia].forEach((ej, index) => {
					const esFuerza = ej.tipo === 'fuerza';
					const etiqueta = esFuerza ? "repeticiones" : "segundos";
					const valor = esFuerza ? ej.reps : ej.tiempo;

					const fila = document.createElement('div');
					fila.className = 'fila-ejercicio';
					fila.innerHTML = `
						<span class="nombre-ejercicio">${ej.nombre}</span>
						<div class="control-tiempo">
							<input type="number" class="input-tiempo input-ej-dinamico"
								   data-dia="${dia}" data-index="${index}" value="${valor}">
							<span style="font-size: 0.8rem; color: #888; width: 110px;">${etiqueta}</span>
						</div>
					`;
					listaInputs.appendChild(fila);
				});
			});
		}		
				

		function cerrarAjustes() {
			
			const inputsDinamicos = document.querySelectorAll('.input-ej-dinamico');
			inputsDinamicos.forEach(input => {
				const dia = input.getAttribute('data-dia');
				const index = input.getAttribute('data-index');
				const valor = parseInt(input.value);
				
				if (rutinas[dia][index].tipo === 'fuerza') {
					rutinas[dia][index].reps = valor;
				} else {
					rutinas[dia][index].tiempo = valor;
				}
			});

			localStorage.setItem('rutinas', JSON.stringify(rutinas));
			document.getElementById('pantalla-ajustes').style.display = 'none';

			if (diaActual) renderizarEjercicio();
		}
		
		function manejarAccion() {
			const ej = rutinas[diaActual][ejercicioIdx];
			
			if (ej.tipo === 'iso') {
				document.getElementById('btn-control').style.display = 'none';
				let t = ej.tiempo;
				document.getElementById('ui-timer').innerText = t;
				
				const interval = setInterval(() => {
					t--;
					document.getElementById('ui-timer').innerText = t;
					
					// Lógica de sonido: si quedan 5 segundos o menos y el tiempo es mayor a 0
					if (t > 0 && t <= 5) {
						emitirPitido();
					}

					if (t <= 0) {
						clearInterval(interval);
						avanzar();
					}
				}, 1000);
			} else {
				avanzar();
			}
		}

		// Nueva función para generar un pitido corto
		function emitirPitido() {
			const context = new (window.AudioContext || window.webkitAudioContext)();
			const osc = context.createOscillator();
			const gain = context.createGain();

			osc.type = 'square'; // Tipo de sonido (beep)
			osc.frequency.setValueAtTime(440, context.currentTime); // Frecuencia de la nota A4
			
			gain.gain.setValueAtTime(0.1, context.currentTime);
			gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.5);

			osc.connect(gain);
			gain.connect(context.destination);

			osc.start();
			osc.stop(context.currentTime + 0.5); // El sonido dura 0.5 segundos
		}
		
        function avanzar() {
			ejercicioIdx++;
			if (ejercicioIdx < rutinas[diaActual].length) {
				renderizarEjercicio();
				
			} else {
				// CAMBIO SUGERIDO
				document.getElementById('ui-nombre').innerText = "¡Completado!";
				document.getElementById('ui-imagen-ejercicio').src = "trofeo.png";
				document.getElementById('ui-timer').style.display = 'none';
				document.getElementById('btn-control').innerText = "VOLVER AL INICIO";
				document.getElementById('btn-control').style.display = 'block';
				document.getElementById('btn-control').onclick = () => location.reload();
			}
		}
    </script>
</body>
